<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link href="styles.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;700&display=swap" rel="stylesheet">
  
  <title>Frontend Mentor | Blog preview card</title>
</head>

<body>

  <main>
    <div class="card">
      <div class="illustration">
        <img src="assets/images/illustration-article.svg" alt="article illustration">
      </div>

      <button type="button">
        <span class="text">Learning</span>
      </button>

      <p class="date">Published 21 DEC 2023</p>
      <h1>HTML & CSS foundations</h1>
      <p class="para">These languages are the backbone of every website, defining sturcture,content, and presentation.</p>

      <div class="avatar">
        <img src="assets/images/image-avatar.webp" alt="Profile of the Publisher">
        <h2>Greg Hooper</h2>
      </div>
    </div>
    
  </main>
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">LastJoy99</a>.
  </footer>
</body>
</html>
